<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 34px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #17324d; }
      .subtitle { font: 500 18px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4d637a; }
      .layerTitle { font: 700 26px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #17324d; }
      .layerText { font: 500 18px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #35506a; }
      .badge { font: 700 18px 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #ffffff; }
      .arrow { stroke: #5d7792; stroke-width: 3; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5d7792"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#f5f8fc"/>
  <text x="700" y="70" text-anchor="middle" class="title">渣土运输与消纳监管平台总体业务架构图</text>
  <text x="700" y="108" text-anchor="middle" class="subtitle">以甲方建设视角展示平台分层、核心业务能力及外部协同边界</text>

  <rect x="80" y="150" width="1240" height="100" rx="24" fill="#dff1ff" stroke="#9ac8e8" stroke-width="2"/>
  <rect x="100" y="178" width="140" height="44" rx="22" fill="#4a90c2"/>
  <text x="170" y="206" text-anchor="middle" class="badge">展示服务层</text>
  <text x="280" y="202" class="layerTitle">面向监管、企业、移动端的统一服务出口</text>
  <text x="280" y="235" class="layerText">统计分析、数据看板、信息查询、消息中心、小程序</text>

  <rect x="120" y="290" width="1160" height="100" rx="24" fill="#e8f6ea" stroke="#a4d1aa" stroke-width="2"/>
  <rect x="140" y="318" width="140" height="44" rx="22" fill="#55a868"/>
  <text x="210" y="346" text-anchor="middle" class="badge">监管风控层</text>
  <text x="320" y="342" class="layerTitle">支撑全过程监管、风险识别、事件闭环与安全治理</text>
  <text x="320" y="375" class="layerText">系统预警、违规车辆、研判模型、安全管理、事件管理</text>

  <rect x="160" y="430" width="1080" height="110" rx="24" fill="#fff5de" stroke="#e4c372" stroke-width="2"/>
  <rect x="180" y="463" width="140" height="44" rx="22" fill="#d09b2e"/>
  <text x="250" y="491" text-anchor="middle" class="badge">经营业务层</text>
  <text x="360" y="482" class="layerTitle">构成平台主业务闭环，承载项目、车辆、合同、场地与结算</text>
  <text x="360" y="515" class="layerText">单位管理、项目管理、合同结算、处置证、消纳场地、车辆管理、车队管理、统计报表</text>

  <rect x="210" y="580" width="980" height="100" rx="24" fill="#f4eafe" stroke="#c7a8eb" stroke-width="2"/>
  <rect x="230" y="608" width="140" height="44" rx="22" fill="#8b67bf"/>
  <text x="300" y="636" text-anchor="middle" class="badge">基础管理层</text>
  <text x="410" y="632" class="layerTitle">提供组织、人员、权限、参数、审批与日志等共性能力底座</text>
  <text x="410" y="665" class="layerText">组织管理、组织人员管理、角色管理、数据字典、系统参数、审批配置、系统日志</text>

  <rect x="260" y="720" width="880" height="90" rx="24" fill="#ffe8e4" stroke="#de9d90" stroke-width="2"/>
  <rect x="280" y="742" width="160" height="42" rx="21" fill="#c96553"/>
  <text x="360" y="769" text-anchor="middle" class="badge">集成支撑层</text>
  <text x="470" y="765" class="layerTitle">统一承接外部数据、设备与认证协同</text>
  <text x="470" y="795" class="layerText">政务网、定位/GPS、视频监控、地磅、统一身份认证、短信、推送</text>

  <path class="arrow" d="M700 250 L700 288"/>
  <path class="arrow" d="M700 390 L700 428"/>
  <path class="arrow" d="M700 540 L700 578"/>
  <path class="arrow" d="M700 680 L700 718"/>

  <text x="1180" y="205" text-anchor="middle" class="subtitle">多端展示</text>
  <text x="1180" y="345" text-anchor="middle" class="subtitle">监管闭环</text>
  <text x="1180" y="488" text-anchor="middle" class="subtitle">主业务承载</text>
  <text x="1180" y="630" text-anchor="middle" class="subtitle">平台底座</text>
  <text x="1180" y="765" text-anchor="middle" class="subtitle">外部协同</text>
</svg>
