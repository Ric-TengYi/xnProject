spring:
  application:
    name: xngl-service
  profiles:
    active: local

server:
  port: ${SERVER_PORT:8090}

# 本地开发时覆盖
---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    # connectTimeout: 建立连接最长等待 5 秒，避免 MySQL 不可用时一直卡住
    # socketTimeout: 读/写最长等待 10 秒，避免慢查询或网络问题导致线程挂死
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:xngl}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&connectTimeout=5000&socketTimeout=10000
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:ForkliftDev2025}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:ForkliftRedis2025}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: xngl-default-secret-change-in-production
    expiration-ms: 86400000
  alerts:
    auto-generate-enabled: true
    auto-generate-cron: "0 0/30 * * * ?"
  schema-sync:
    # 启动时是否执行 SQL 校对（缺表/缺字段则补充）。稳定上线后可设为 false，避免每次启动执行导致启动变慢
    enabled: true
    # 大表：缺少字段时只打日志提示，不执行 ALTER（避免锁表/长时间 DDL）
    warn-only-tables: biz_vehicle,vehicle_gps
